name: Build and deploy frontend to Azure Web App - SmartCare-WebApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C6B24BE03C6F41C5B8CBDB2B79385AB3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B140817C1B9D4816B632BE9C10103693 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_85AD276EA8814D258CEA47C9B625AF98 }}

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SmartCare-WebApp'
          slot-name: 'Production'
          package: ./frontend
